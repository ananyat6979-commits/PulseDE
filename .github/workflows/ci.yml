name: CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ─── Quality gates ───────────────────────────────────────────────────────────
  lint-and-type-check:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]" --no-build-isolation

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: MyPy type check
        run: mypy src/ --ignore-missing-imports

  # ─── Tests ───────────────────────────────────────────────────────────────────
  test:
    name: Test suite
    runs-on: ubuntu-latest
    needs: lint-and-type-check

    services:
      redis:
        image: redis:7.2-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: timescale/timescaledb:latest-pg16
        ports: ["5432:5432"]
        env:
          POSTGRES_DB: pulsede_test
          POSTGRES_USER: pulsede
          POSTGRES_PASSWORD: pulsede
        options: >-
          --health-cmd "pg_isready -U pulsede"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" --no-build-isolation

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-finbert-v1

      - name: Run tests with coverage
        env:
          DB_HOST: localhost
          DB_NAME: pulsede_test
          DB_USER: pulsede
          DB_PASSWORD: pulsede
          REDIS_HOST: localhost
          NEWS_API_KEY: test-key
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v \
            --tb=short

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ─── Security scan ────────────────────────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bandit security scan
        run: |
          pip install bandit
          bandit -r src/ -ll -ii --skip B101

      - name: Safety dependency scan
        run: |
          pip install safety
          safety check --full-report

  # ─── Docker build (main branch only) ─────────────────────────────────────────
  docker-build:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        target: [api, consumer, dashboard]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.target }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  # ─── Deploy (tag-based) ───────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - name: Trigger staging deploy
        run: |
          echo "Deploy ${{ github.sha }} to staging"
          # Add: kubectl set image deployment/pulsede-api api=... 
          # or: SSH into server and docker-compose pull && docker-compose up -d
