global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: pulsede
    env: production

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: pulsede-api
    static_configs:
      - targets: ["pulsede-api:8000"]
    metrics_path: /metrics

  - job_name: pulsede-consumer
    static_configs:
      - targets: ["pulsede-consumer:8001"]
    metrics_path: /metrics

  - job_name: kafka
    static_configs:
      - targets: ["kafka:9092"]

  - job_name: timescaledb
    static_configs:
      - targets: ["timescaledb:9187"]   # postgres_exporter

  - job_name: redis
    static_configs:
      - targets: ["redis:9121"]         # redis_exporter

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
